name: Create Repository with Branches

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: Repository name to create
        required: true
        type: string
      owner:
        description: Owner or organization (optional, defaults to authenticated user)
        required: false
        type: string
      visibility:
        description: Repository visibility
        required: true
        default: public
        type: choice
        options:
          - public
          - private

jobs:
  create-repository:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create repository and branches
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "Failed to generate GitHub App token. Ensure the app is installed on this repository and APP_ID/APP_PRIVATE_KEY are correct."
            exit 1
          fi

          ./.github/scripts/create-repo-with-branches.sh "${{ inputs.repo_name }}" "${{ inputs.owner }}" "${{ inputs.visibility }}"
